<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hancer Group | Social Media Agency</title>

    <meta name="description"
          content="Choose your language to explore Hancer Group social media management, digital advertising, content production and digital strategy services.">

    <meta name="robots" content="noindex, follow">

    <link rel="icon" type="image/svg+xml" href="./favicon.svg">

    <script>
        (function () {
            const language = (navigator.language || "tr").toLowerCase();
            const isFileProtocol = window.location.protocol === "file:";
            const getLanguageTarget = (locale) =>
                `./${locale}/${isFileProtocol ? "index.html" : ""}`;

            let locale = "tr";

            if (language.startsWith("en")) {
                locale = "en";
            } else if (language.startsWith("ru")) {
                locale = "ru";
            } else if (language.startsWith("ar")) {
                locale = "ar";
            }

            window.addEventListener("DOMContentLoaded", () => {
                document.querySelectorAll("[data-language-route]")
                    .forEach((link) => {
                        link.href = getLanguageTarget(
                            link.dataset.languageRoute
                        );
                    });
            });

            window.location.replace(getLanguageTarget(locale));
        })();
    </script>
</head>

<body>
    <main>
        <h1>Hancer Group</h1>

        <p>Select your language:</p>

        <nav aria-label="Language selection">
            <a href="./tr/" data-language-route="tr">Türkçe</a>
            <a href="./en/" data-language-route="en">English</a>
            <a href="./ru/" data-language-route="ru">Русский</a>
            <a href="./ar/" data-language-route="ar">العربية</a>
        </nav>
    </main>
</body>
</html>
